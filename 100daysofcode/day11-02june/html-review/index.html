<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASCII-Art-web</title>
</head>
<body>
    <form action="" method="">
        <div>
            <input required placeholder="Enter text">
        </div>
        <div>
            Allowed Banners:
            <div>
                <label for="shadow">Shadow</label>
                <input type="radio" name="banner" value="shadow">
            </div>
            <div>
                <label for="standard">Standard</label>
                <input type="radio" name="banner" value="standard">
            </div>
            <div>
                <label for="thinkertoy">Thinkertoy</label>
                <input type="radio" name="banner" value="Thinkertoy">
            </div>
        </div>
        <input type="reset" value="Reset">
        <br>
        <input type="submit" value="Generate">
        <br>
        <label for="cars">Choose a car:</label>
<select name="cars" id="cars">
  <option value="volvo">Volvo</option>
  <option value="saab">Saab</option>
  <option value="mercedes">Mercedes</option>
  <option value="audi">Audi</option>
</select>
<p>What are your favorite hobbies?</p>
<input type="checkbox" id="coding" name="hobbies" value="coding">
<label for="coding">Coding</label><br>

<input type="checkbox" id="music" name="hobbies" value="music">
<label for="music">Music</label><br>

<input type="checkbox" id="sports" name="hobbies" value="sports">
<label for="sports">Sports</label>

    </form>
</body>
</html>
