<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASCII-Art-web</title>
</head>
<body>
    <form action="/Ascii-art-web" method="POST">
        <div>
            <input type="text " name="text" required placeholder="Enter text">
        </div>
        <div>
            Allowed Banners:
            <div>
                <label for="shadow">Shadow</label>
                <input type="radio" name="banner" value="shadow">
            </div>
            <div>
                <label for="standard">Standard</label>
                <input type="radio" name="banner" value="standard">
            </div>
            <div>
                <label for="thinkertoy">Thinkertoy</label>
                <input type="radio" name="banner" value="Thinkertoy">
            </div>
        </div>
        <input type="reset" value="Reset">
        <input type="submit" value="Generate">
    </form>
    {{if .Result}}
    <pre>{{.Result}}</pre>
    <a href="/ascii-art-switch?text={{.Text}}&banner=shadow">Shadow</a>
    <a href="/ascii-art-switch?text={{.Text}}&banner=standard">Standard</a>
    <a href="/ascii-art-switch?text={{.Text}}&banner=thinkertoy">Thiinkertoy</a>
    {{end}}
</body>
</html>
